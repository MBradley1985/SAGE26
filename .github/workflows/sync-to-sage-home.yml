name: Sync to sage-home/SAGE26

on:
  push:
    branches:
      - main
      - dev

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for mirror push

      - name: Push to sage-home/SAGE26
        env:
          SAGE_HOME_TOKEN: ${{ secrets.SAGE_HOME_TOKEN }}
        run: |
          if [ -z "$SAGE_HOME_TOKEN" ]; then
            echo "ERROR: SAGE_HOME_TOKEN secret is not set or is empty"
            exit 1
          fi
          git remote add sage-home https://x-access-token:${SAGE_HOME_TOKEN}@github.com/sage-home/SAGE26.git
          git push sage-home ${{ github.ref_name }}
